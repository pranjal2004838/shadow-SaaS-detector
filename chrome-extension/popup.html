<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shadow SaaS Detector</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        margin: 0;
        padding: 16px;
        width: 300px;
        background: #0f172a;
        color: #e2e8f0;
      }
      h1 {
        font-size: 16px;
        margin: 0 0 8px;
      }
      p {
        font-size: 12px;
        color: #94a3b8;
        margin: 0 0 12px;
        line-height: 1.5;
      }
      button {
        width: 100%;
        border: none;
        border-radius: 8px;
        padding: 10px 12px;
        background: #2563eb;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      #status {
        margin-top: 10px;
        font-size: 12px;
        min-height: 20px;
      }
      .ok { color: #22c55e; }
      .error { color: #ef4444; }
    </style>
  </head>
  <body>
    <h1>Shadow SaaS Detector</h1>
    <p>Scan the last 90 days of browser history and send unique domains to your local detector backend.</p>
    <button id="scan-btn">Scan Browser History</button>
    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
